<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dharatrack — Test Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f1318;
      color: #e8e8e8;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.1rem; margin: 1.5rem 0 0.5rem; color: #8b9ab5; }
    .summary {
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .summary.pass { background: hsla(152, 68%, 52%, 0.1); border: 1px solid hsla(152, 68%, 52%, 0.3); }
    .summary.fail { background: hsla(0, 78%, 62%, 0.1); border: 1px solid hsla(0, 78%, 62%, 0.3); }
    .test-result {
      padding: 0.5rem 1rem;
      margin: 0.25rem 0;
      border-radius: 6px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .test-result.pass { background: hsla(152, 68%, 52%, 0.06); }
    .test-result.fail { background: hsla(0, 78%, 62%, 0.08); color: #f87171; }
    .test-result .icon { font-size: 1rem; }
    .test-result .error { font-size: 0.75rem; color: #f87171; margin-top: 0.25rem; display: block; }
    .test-result .name { flex: 1; }
    .test-result .time { color: #6b7280; font-size: 0.75rem; }
  </style>
</head>
<body>
  <h1>🧪 Dharatrack Test Runner</h1>
  <div id="summary" class="summary"></div>
  <div id="results"></div>

  <script type="module">
    // ---- Minimal Test Framework ----
    const results = [];
    let currentSuite = '';

    function describe(name, fn) {
      currentSuite = name;
      fn();
    }

    function it(name, fn) {
      const start = performance.now();
      try {
        fn();
        results.push({ suite: currentSuite, name, pass: true, time: performance.now() - start });
      } catch (e) {
        results.push({ suite: currentSuite, name, pass: false, error: e.message, time: performance.now() - start });
      }
    }

    function expect(actual) {
      return {
        toBe(expected) {
          if (actual !== expected) throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
        },
        toBeCloseTo(expected, tolerance = 0.01) {
          if (Math.abs(actual - expected) > tolerance) throw new Error(`Expected ~${expected}, got ${actual} (tolerance: ${tolerance})`);
        },
        toBeGreaterThan(expected) {
          if (actual <= expected) throw new Error(`Expected ${actual} > ${expected}`);
        },
        toBeLessThan(expected) {
          if (actual >= expected) throw new Error(`Expected ${actual} < ${expected}`);
        },
        toBeTruthy() {
          if (!actual) throw new Error(`Expected truthy, got ${JSON.stringify(actual)}`);
        },
        toBeFalsy() {
          if (actual) throw new Error(`Expected falsy, got ${JSON.stringify(actual)}`);
        },
        toEqual(expected) {
          const a = JSON.stringify(actual);
          const b = JSON.stringify(expected);
          if (a !== b) throw new Error(`Expected ${b}, got ${a}`);
        },
        toContain(expected) {
          if (typeof actual === 'string' && !actual.includes(expected)) {
            throw new Error(`Expected string to contain "${expected}"`);
          } else if (Array.isArray(actual) && !actual.includes(expected)) {
            throw new Error(`Expected array to contain ${JSON.stringify(expected)}`);
          }
        },
        toHaveLength(expected) {
          if (actual.length !== expected) throw new Error(`Expected length ${expected}, got ${actual.length}`);
        },
        toBeInstanceOf(expected) {
          if (!(actual instanceof expected)) throw new Error(`Expected instance of ${expected.name}`);
        }
      };
    }

    // ---- Import Modules ----
    const { Sanitize } = await import('../js/utils/sanitize.js');
    const { formatCO2, formatDate, formatRelativeTime, formatPercentage, formatNumber, weekStart, monthStart, today, daysAgo, dateRange } = await import('../js/utils/format.js');
    const { calculateTransport, calculateDiet, calculateEnergy, calculateShopping, calculateTotalFromQuiz, activityToCO2, getFootprintRating, TRANSPORT_FACTORS, DIET_FACTORS, BASELINES } = await import('../js/engine/calculator.js');
    const { TIPS_DATABASE, getTips, getRelevantTips, getRandomTip } = await import('../js/engine/tips.js');
    const { CHALLENGES, getChallengeById, getChallengeProgress } = await import('../js/engine/challenges.js');
    const { Assistant } = await import('../js/engine/assistant.js');

    // ==== CALCULATOR TESTS ====
    describe('Calculator — Emission Factors', () => {
      it('should have positive emission factors for car_petrol', () => {
        expect(TRANSPORT_FACTORS.car_petrol).toBeGreaterThan(0);
      });

      it('should have zero emission factor for bicycle', () => {
        expect(TRANSPORT_FACTORS.bicycle).toBe(0);
      });

      it('should have zero emission factor for walking', () => {
        expect(TRANSPORT_FACTORS.walking).toBe(0);
      });

      it('should have higher emissions for beef than chicken', () => {
        expect(DIET_FACTORS.beef).toBeGreaterThan(DIET_FACTORS.chicken);
      });

      it('should have higher emissions for heavy_meat diet than vegan', () => {
        expect(DIET_FACTORS.diet_heavy_meat).toBeGreaterThan(DIET_FACTORS.diet_vegan);
      });
    });

    describe('Calculator — Transport Calculation', () => {
      it('should calculate zero for bicycle commute', () => {
        const result = calculateTransport({ commuteMode: 'bicycle', commuteDistance: 10, commuteDays: 5, flights: 0 });
        expect(result).toBe(0);
      });

      it('should calculate positive for car commute', () => {
        const result = calculateTransport({ commuteMode: 'car_petrol', commuteDistance: 20, commuteDays: 5, flights: 0 });
        expect(result).toBeGreaterThan(0);
      });

      it('should increase with more flights', () => {
        const noFlights = calculateTransport({ commuteMode: 'bicycle', commuteDistance: 0, commuteDays: 0, flights: 0 });
        const withFlights = calculateTransport({ commuteMode: 'bicycle', commuteDistance: 0, commuteDays: 0, flights: 5 });
        expect(withFlights).toBeGreaterThan(noFlights);
      });

      it('should handle zero commute days', () => {
        const result = calculateTransport({ commuteMode: 'car_petrol', commuteDistance: 20, commuteDays: 0, flights: 0 });
        expect(result).toBe(0);
      });
    });

    describe('Calculator — Diet Calculation', () => {
      it('should return annual diet emissions', () => {
        const result = calculateDiet({ dietType: 'medium_meat' });
        expect(result).toBeGreaterThan(1000);
      });

      it('should be higher for heavy_meat than vegan', () => {
        const heavy = calculateDiet({ dietType: 'heavy_meat' });
        const vegan = calculateDiet({ dietType: 'vegan' });
        expect(heavy).toBeGreaterThan(vegan);
      });
    });

    describe('Calculator — Total Footprint', () => {
      it('should return all four categories plus total', () => {
        const result = calculateTotalFromQuiz({
          commuteMode: 'car_petrol', commuteDistance: 15, commuteDays: 5, flights: 2,
          dietType: 'medium_meat', homeSize: 'medium', heatingType: 'gas',
          renewablePercent: 0, shoppingHabit: 'moderate', onlineOrders: 4
        });
        expect(result.transport).toBeGreaterThan(0);
        expect(result.diet).toBeGreaterThan(0);
        expect(result.energy).toBeGreaterThan(0);
        expect(result.shopping).toBeGreaterThan(0);
        expect(result.total).toBe(result.transport + result.diet + result.energy + result.shopping);
      });
    });

    describe('Calculator — Activity to CO2', () => {
      it('should convert car_petrol km to CO2', () => {
        const co2 = activityToCO2({ category: 'transport', type: 'car_petrol', amount: 10 });
        expect(co2).toBeCloseTo(1.92, 0.01);
      });

      it('should return 0 for bicycle', () => {
        const co2 = activityToCO2({ category: 'transport', type: 'bicycle', amount: 50 });
        expect(co2).toBe(0);
      });

      it('should return 0 for unknown type', () => {
        const co2 = activityToCO2({ category: 'transport', type: 'teleporter', amount: 10 });
        expect(co2).toBe(0);
      });
    });

    describe('Calculator — Footprint Rating', () => {
      it('should rate low emissions as excellent', () => {
        const rating = getFootprintRating(800);
        expect(rating.rating).toBe('excellent');
      });

      it('should rate high emissions as high or very_high', () => {
        const rating = getFootprintRating(20000);
        expect(rating.rating).toBe('very_high');
      });

      it('should rate global average as good or average', () => {
        const rating = getFootprintRating(BASELINES.global_avg);
        expect(rating.percentile).toBeGreaterThan(0);
      });
    });

    // ==== SANITIZE TESTS ====
    describe('Sanitize — HTML Escaping', () => {
      it('should escape angle brackets', () => {
        expect(Sanitize.escapeHTML('<script>alert("xss")</' + 'script>')).toBe('&lt;script&gt;alert(&quot;xss&quot;)&lt;&#x2F;script&gt;');
      });

      it('should escape ampersands', () => {
        expect(Sanitize.escapeHTML('Tom & Jerry')).toBe('Tom &amp; Jerry');
      });

      it('should handle empty string', () => {
        expect(Sanitize.escapeHTML('')).toBe('');
      });

      it('should handle non-string input', () => {
        expect(Sanitize.escapeHTML(null)).toBe('');
        expect(Sanitize.escapeHTML(undefined)).toBe('');
        expect(Sanitize.escapeHTML(123)).toBe('');
      });

      it('should escape backticks', () => {
        expect(Sanitize.escapeHTML('`code`')).toBe('&#96;code&#96;');
      });
    });

    describe('Sanitize — Strip Tags', () => {
      it('should remove HTML tags', () => {
        expect(Sanitize.stripTags('<p>Hello <b>world</b></p>')).toBe('Hello world');
      });
    });

    describe('Sanitize — Number Validation', () => {
      it('should parse valid numbers', () => {
        expect(Sanitize.number('42')).toBe(42);
      });

      it('should respect min/max bounds', () => {
        expect(Sanitize.number('200', { min: 0, max: 100 })).toBe(100);
        expect(Sanitize.number('-5', { min: 0 })).toBe(0);
      });

      it('should return fallback for NaN', () => {
        expect(Sanitize.number('abc', { fallback: 10 })).toBe(10);
      });

      it('should handle Infinity', () => {
        expect(Sanitize.number('Infinity', { fallback: 0 })).toBe(0);
      });
    });

    describe('Sanitize — String Validation', () => {
      it('should trim whitespace', () => {
        expect(Sanitize.string('  hello  ')).toBe('hello');
      });

      it('should enforce max length', () => {
        expect(Sanitize.string('abcdefghij', { maxLength: 5 })).toBe('abcde');
      });

      it('should return fallback for empty', () => {
        expect(Sanitize.string('', { fallback: 'default' })).toBe('default');
      });

      it('should return fallback for non-string', () => {
        expect(Sanitize.string(42, { fallback: 'num' })).toBe('num');
      });
    });

    describe('Sanitize — Date Validation', () => {
      it('should accept valid dates', () => {
        expect(Sanitize.date('2024-06-15')).toBe('2024-06-15');
      });

      it('should reject invalid dates', () => {
        const result = Sanitize.date('not-a-date');
        expect(result).toBe(today());
      });

      it('should reject invalid format', () => {
        const result = Sanitize.date('15/06/2024');
        expect(result).toBe(today());
      });
    });

    describe('Sanitize — Enum Validation', () => {
      it('should accept valid enum value', () => {
        expect(Sanitize.enum('apple', ['apple', 'banana', 'cherry'])).toBe('apple');
      });

      it('should return fallback for invalid value', () => {
        expect(Sanitize.enum('grape', ['apple', 'banana'], 'apple')).toBe('apple');
      });
    });

    describe('Sanitize — ID Validation', () => {
      it('should accept valid IDs', () => {
        expect(Sanitize.id('my-id_123')).toBe('my-id_123');
      });

      it('should strip invalid characters', () => {
        expect(Sanitize.id('my<id>test')).toBe('myidtest');
      });

      it('should return null for empty', () => {
        expect(Sanitize.id('')).toBe(null);
      });
    });

    // ==== TIPS TESTS ====
    describe('Tips — Database', () => {
      it('should have at least 100 tips', () => {
        expect(TIPS_DATABASE.length).toBeGreaterThan(99);
      });

      it('should have tips in all categories', () => {
        const categories = new Set(TIPS_DATABASE.map(t => t.category));
        expect(categories.has('transport')).toBeTruthy();
        expect(categories.has('diet')).toBeTruthy();
        expect(categories.has('energy')).toBeTruthy();
        expect(categories.has('shopping')).toBeTruthy();
      });

      it('should have unique IDs', () => {
        const ids = TIPS_DATABASE.map(t => t.id);
        const unique = new Set(ids);
        expect(unique.size).toBe(ids.length);
      });
    });

    describe('Tips — Filtering', () => {
      it('should filter by category', () => {
        const tips = getTips({ category: 'transport', limit: 5 });
        expect(tips.length).toBeLessThan(6);
        tips.forEach(t => expect(t.category).toBe('transport'));
      });

      it('should exclude shown tips', () => {
        const tips = getTips({ limit: 3 });
        const ids = tips.map(t => t.id);
        const more = getTips({ excludeIds: ids, limit: 3 });
        more.forEach(t => expect(ids.includes(t.id)).toBeFalsy());
      });

      it('should return relevant tips for high transport', () => {
        const tips = getRelevantTips({ transport: 5000, diet: 1000, energy: 1000, shopping: 500 });
        expect(tips.length).toBeGreaterThan(0);
      });
    });

    // ==== CHALLENGES TESTS ====
    describe('Challenges', () => {
      it('should have at least 4 challenges', () => {
        expect(CHALLENGES.length).toBeGreaterThan(3);
      });

      it('should find challenge by ID', () => {
        const ch = getChallengeById('meatless-mondays');
        expect(ch).toBeTruthy();
        expect(ch.totalDays).toBe(30);
      });

      it('should calculate progress correctly', () => {
        const progress = getChallengeProgress('meatless-mondays', [1, 2, 3]);
        expect(progress.completedCount).toBe(3);
        expect(progress.percentage).toBe(10);
      });

      it('should handle empty completed days', () => {
        const progress = getChallengeProgress('meatless-mondays', []);
        expect(progress.completedCount).toBe(0);
        expect(progress.percentage).toBe(0);
      });
    });

    // ==== ASSISTANT TESTS ====
    describe('Assistant — Intent Detection', () => {
      const bot = new Assistant();
      const ctx = {
        profile: { dietType: 'medium_meat' },
        breakdown: { transport: 3000, diet: 2000, energy: 1500, shopping: 800, total: 7300 },
        recentActivities: [],
        streak: 5
      };

      it('should detect greeting intent', () => {
        const intent = bot._detectIntent('hello!');
        const res = bot._getRuleBasedResponse(intent, 'hello!', ctx);
        expect(res.type).toBe('greeting');
      });

      it('should detect tip request', () => {
        const bot2 = new Assistant();
        const intent = bot2._detectIntent('give me some advice');
        const res = bot2._getRuleBasedResponse(intent, 'give me some advice', ctx);
        expect(res.type).toBe('tip');
      });

      it('should detect footprint query', () => {
        const bot3 = new Assistant();
        const intent = bot3._detectIntent('show my footprint');
        const res = bot3._getRuleBasedResponse(intent, 'show my footprint', ctx);
        expect(res.type).toBe('analysis');
      });

      it('should detect transport category', () => {
        const bot4 = new Assistant();
        const intent = bot4._detectIntent('tell me about driving');
        const res = bot4._getRuleBasedResponse(intent, 'tell me about driving', ctx);
        expect(res.type).toBe('analysis');
      });

      it('should detect challenge query', () => {
        const bot5 = new Assistant();
        const intent = bot5._detectIntent('show me challenges');
        const res = bot5._getRuleBasedResponse(intent, 'show me challenges', ctx);
        expect(res.type).toBe('info');
      });

      it('should handle unknown input gracefully', () => {
        const bot6 = new Assistant();
        const intent = bot6._detectIntent('asdfghjkl');
        const res = bot6._getRuleBasedResponse(intent, 'asdfghjkl', ctx);
        expect(res.type).toBe('help');
        expect(res.text.length).toBeGreaterThan(0);
      });

      it('should provide quick replies', () => {
        const bot7 = new Assistant();
        const intent = bot7._detectIntent('hello');
        const res = bot7._getRuleBasedResponse(intent, 'hello', ctx);
        expect(res.quickReplies.length).toBeGreaterThan(0);
      });
    });

    describe('Assistant — Proactive Messages', () => {
      it('should generate proactive message for high transport', () => {
        const bot = new Assistant();
        const weekAgo = new Date();
        weekAgo.setDate(weekAgo.getDate() - 3);
        const activities = Array(6).fill(null).map(() => ({
          category: 'transport', type: 'car_petrol',
          date: weekAgo.toISOString().split('T')[0], co2: 3
        }));
        const msg = bot.getProactiveMessage({ recentActivities: activities, breakdown: {}, streak: 1 });
        expect(msg).toBeTruthy();
      });

      it('should return null for no activities', () => {
        const bot = new Assistant();
        const msg = bot.getProactiveMessage({ recentActivities: [], breakdown: {} });
        expect(msg).toBe(null);
      });
    });

    // ==== FORMAT TESTS ====
    describe('Format — CO2', () => {
      it('should format grams', () => {
        expect(formatCO2(0.5)).toContain('g');
      });

      it('should format kilograms', () => {
        expect(formatCO2(42)).toContain('kg');
      });

      it('should format tonnes', () => {
        expect(formatCO2(1500)).toContain('tonnes');
      });

      it('should handle zero', () => {
        expect(formatCO2(0)).toContain('0');
      });
    });

    describe('Format — Date Utilities', () => {
      it('today() should return YYYY-MM-DD format', () => {
        const t = today();
        expect(t).toBeTruthy();
        expect(t.length).toBe(10);
        expect(t[4]).toBe('-');
      });

      it('daysAgo should return a past date', () => {
        const past = daysAgo(7);
        expect(past < today()).toBeTruthy();
      });

      it('dateRange should return correct number of dates', () => {
        const range = dateRange('2024-01-01', '2024-01-07');
        expect(range).toHaveLength(7);
      });
    });


    // ==== STORE CRUD TESTS ====
    // Note: We need to import store functions for testing
    const storeModule = await import('../js/store.js');
    const { getState, setState, resetState, addActivity, deleteActivity, getActivities, getDailyTotals, getTotalCO2, setMonthlyTarget, joinChallenge, completeChallengeDay, leaveChallenge } = storeModule;

    // Reset state before store tests
    resetState();

    describe('Store — State Management', () => {
      it('should return default state when fresh', () => {
        resetState();
        const state = getState();
        expect(state.onboarded).toBe(false);
        expect(state.activities).toEqual([]);
        expect(state.breakdown.total).toBe(0);
      });

      it('should update state with partial updates', () => {
        resetState();
        setState({ onboarded: true });
        const state = getState();
        expect(state.onboarded).toBe(true);
      });

      it('should update state with updater function', () => {
        resetState();
        setState(s => { s.onboarded = true; return s; });
        expect(getState().onboarded).toBe(true);
      });

      it('should set _lastUpdated on each setState', () => {
        resetState();
        setState({ onboarded: true });
        expect(getState()._lastUpdated).toBeTruthy();
      });
    });

    describe('Store — Activity CRUD', () => {
      it('should add an activity', () => {
        resetState();
        addActivity({ category: 'transport', type: 'car_petrol', label: 'Drove to work', amount: 20, unit: 'km', co2: 3.84, date: today(), description: 'Test' });
        const activities = getActivities({});
        expect(activities.length).toBe(1);
        expect(activities[0].category).toBe('transport');
      });

      it('should generate unique IDs for activities', () => {
        resetState();
        addActivity({ category: 'transport', type: 'car_petrol', label: 'Trip 1', amount: 10, unit: 'km', co2: 1.92 });
        addActivity({ category: 'diet', type: 'beef', label: 'Beef meal', amount: 1, unit: 'servings', co2: 6.61 });
        const activities = getActivities({});
        expect(activities.length).toBe(2);
        const ids = activities.map(a => a.id);
        expect(ids[0] !== ids[1]).toBeTruthy();
      });

      it('should delete an activity by ID', () => {
        resetState();
        addActivity({ category: 'transport', type: 'car_petrol', label: 'Test', amount: 10, unit: 'km', co2: 1.92 });
        const activities = getActivities({});
        const id = activities[0].id;
        deleteActivity(id);
        expect(getActivities({}).length).toBe(0);
      });

      it('should filter activities by category', () => {
        resetState();
        addActivity({ category: 'transport', type: 'car_petrol', label: 'Drive', amount: 10, unit: 'km', co2: 1.92 });
        addActivity({ category: 'diet', type: 'beef', label: 'Beef', amount: 1, unit: 'servings', co2: 6.61 });
        const transport = getActivities({ category: 'transport' });
        expect(transport.length).toBe(1);
        expect(transport[0].category).toBe('transport');
      });

      it('should sanitize activity inputs', () => {
        resetState();
        addActivity({ category: 'transport', type: '<script>alert(1)<\\/script>', label: 'Test<b>Bold</b>', amount: -5, unit: 'km', co2: 999999 });
        const activities = getActivities({});
        expect(activities[0].amount).toBe(0); // min: 0
        expect(activities[0].co2).toBe(100000); // max: 100000
      });
    });

    describe('Store — CO2 Queries', () => {
      it('should calculate total CO2 for a date range', () => {
        resetState();
        const todayStr = today();
        addActivity({ category: 'transport', type: 'car_petrol', label: 'Drive', amount: 10, unit: 'km', co2: 1.92, date: todayStr });
        addActivity({ category: 'diet', type: 'beef', label: 'Beef', amount: 1, unit: 'servings', co2: 6.61, date: todayStr });
        const total = getTotalCO2(todayStr, todayStr);
        expect(total).toBeCloseTo(8.53, 0.1);
      });

      it('should return daily totals', () => {
        resetState();
        const todayStr = today();
        addActivity({ category: 'transport', type: 'car_petrol', label: 'Drive', amount: 10, unit: 'km', co2: 5.0, date: todayStr });
        const dailyTotals = getDailyTotals(todayStr, todayStr);
        expect(dailyTotals.length).toBe(1);
        expect(dailyTotals[0].total).toBeCloseTo(5.0, 0.1);
        expect(dailyTotals[0].transport).toBeCloseTo(5.0, 0.1);
      });
    });

    // ==== GOAL MANAGEMENT TESTS ====
    describe('Store — Goal Management', () => {
      it('should set monthly target', () => {
        resetState();
        setMonthlyTarget(500);
        expect(getState().goals.monthlyTarget).toBe(500);
      });

      it('should sanitize monthly target', () => {
        resetState();
        setMonthlyTarget(-100);
        expect(getState().goals.monthlyTarget).toBe(0);
      });

      it('should join a challenge', () => {
        resetState();
        joinChallenge('meatless-mondays');
        const challenges = getState().goals.activeChallenges;
        expect(challenges.length).toBe(1);
        expect(challenges[0].challengeId).toBe('meatless-mondays');
      });

      it('should not duplicate challenge joins', () => {
        resetState();
        joinChallenge('meatless-mondays');
        joinChallenge('meatless-mondays');
        expect(getState().goals.activeChallenges.length).toBe(1);
      });

      it('should complete a challenge day', () => {
        resetState();
        joinChallenge('meatless-mondays');
        completeChallengeDay('meatless-mondays', 1);
        const challenge = getState().goals.activeChallenges[0];
        expect(challenge.completedDays).toContain(1);
      });

      it('should not duplicate completed days', () => {
        resetState();
        joinChallenge('meatless-mondays');
        completeChallengeDay('meatless-mondays', 1);
        completeChallengeDay('meatless-mondays', 1);
        const challenge = getState().goals.activeChallenges[0];
        expect(challenge.completedDays.length).toBe(1);
      });

      it('should leave a challenge', () => {
        resetState();
        joinChallenge('meatless-mondays');
        joinChallenge('bike-week');
        leaveChallenge('meatless-mondays');
        expect(getState().goals.activeChallenges.length).toBe(1);
        expect(getState().goals.activeChallenges[0].challengeId).toBe('bike-week');
      });
    });

    // ==== COMPREHENSIVE FORMAT TESTS ====
    // Formatter functions already imported at the top

    describe('Format — Percentage', () => {
      it('should format 0.42 as 42%', () => {
        expect(formatPercentage(0.42)).toBe('42%');
      });

      it('should format 1.0 as 100%', () => {
        expect(formatPercentage(1.0)).toBe('100%');
      });

      it('should format with decimals', () => {
        expect(formatPercentage(0.4567, 1)).toBe('45.7%');
      });

      it('should handle zero', () => {
        expect(formatPercentage(0)).toBe('0%');
      });
    });

    describe('Format — Number', () => {
      it('should format with locale separators', () => {
        const result = formatNumber(1234567);
        expect(result).toContain('1');
      });

      it('should support decimal places', () => {
        const result = formatNumber(42.567, 2);
        expect(result).toContain('42');
      });
    });

    describe('Format — Relative Time', () => {
      it('should return "just now" for recent times', () => {
        const now = new Date();
        expect(formatRelativeTime(now)).toBe('just now');
      });

      it('should return empty string for invalid dates', () => {
        expect(formatRelativeTime('not-a-date')).toBe('');
      });

      it('should format yesterday', () => {
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        yesterday.setHours(yesterday.getHours() - 1);
        expect(formatRelativeTime(yesterday)).toBe('yesterday');
      });
    });

    describe('Format — Date Helpers', () => {
      it('weekStart should return a valid date string', () => {
        const ws = weekStart();
        expect(ws.length).toBe(10);
        expect(ws[4]).toBe('-');
        // weekStart should be within the last 7 days
        expect(ws <= today()).toBeTruthy();
      });

      it('monthStart should return first of current month', () => {
        const ms = monthStart();
        // Due to timezones, this might be 31, 01, or 02 in UTC
        const day = ms.slice(-2);
        expect(day === '01' || day === '02' || day === '31').toBeTruthy();
      });

      it('formatDate should handle Date objects', () => {
        const result = formatDate(new Date('2024-06-15'));
        expect(result).toContain('Jun');
        expect(result).toContain('15');
      });

      it('formatDate should handle invalid date strings', () => {
        expect(formatDate('garbage')).toBe('Invalid date');
      });

      it('formatDate should support short style', () => {
        const result = formatDate('2024-12-25', 'short');
        expect(result).toContain('12');
        expect(result).toContain('25');
      });
    });

    // ==== DOM UTILITY TESTS ====
    const { createElement, clearChildren, setHTML, safeHTML } = await import('../js/utils/dom.js');

    describe('DOM — createElement', () => {
      it('should create element with correct tag', () => {
        const el = createElement('div');
        expect(el.tagName).toBe('DIV');
      });

      it('should set className', () => {
        const el = createElement('span', { className: 'test-class' });
        expect(el.className).toBe('test-class');
      });

      it('should set dataset attributes', () => {
        const el = createElement('div', { dataset: { foo: 'bar' } });
        expect(el.dataset.foo).toBe('bar');
      });

      it('should set ARIA attributes', () => {
        const el = createElement('button', { aria: { label: 'Click me', expanded: 'false' } });
        expect(el.getAttribute('aria-label')).toBe('Click me');
        expect(el.getAttribute('aria-expanded')).toBe('false');
      });

      it('should add text children', () => {
        const el = createElement('p', {}, 'Hello', ' World');
        expect(el.textContent).toBe('Hello World');
      });

      it('should add element children', () => {
        const child = createElement('span', {}, 'inner');
        const parent = createElement('div', {}, child);
        expect(parent.children.length).toBe(1);
        expect(parent.children[0].textContent).toBe('inner');
      });
    });

    describe('DOM — clearChildren', () => {
      it('should remove all child nodes', () => {
        const el = document.createElement('div');
        el.appendChild(document.createElement('span'));
        el.appendChild(document.createElement('p'));
        clearChildren(el);
        expect(el.childNodes.length).toBe(0);
      });
    });

    describe('DOM — setHTML', () => {
      it('should set HTML content', () => {
        const el = document.createElement('div');
        setHTML(el, '<b>Bold</b>');
        expect(el.innerHTML).toContain('Bold');
      });
    });

    describe('DOM — safeHTML', () => {
      it('should escape interpolated values', () => {
        const userInput = '<script>alert("xss")<\\/script>';
        const result = safeHTML`<p>User said: ${userInput}</p>`;
        expect(result).toContain('&lt;script&gt;');
        expect(result.includes('<script>')).toBeFalsy();
      });
    });

    // ==== CHALLENGES EDGE CASE TESTS ====
    describe('Challenges — Edge Cases', () => {
      it('should return undefined for unknown challenge ID', () => {
        const ch = getChallengeById('nonexistent');
        expect(ch).toBe(undefined);
      });

      it('should return zero progress for unknown challenge', () => {
        const progress = getChallengeProgress('nonexistent', [1, 2, 3]);
        expect(progress.percentage).toBe(0);
        expect(progress.completedCount).toBe(0);
        expect(progress.totalDays).toBe(0);
      });

      it('should calculate savings correctly', () => {
        const progress = getChallengeProgress('meatless-mondays', [1, 5, 7]);
        expect(progress.savedKg).toBeGreaterThan(0);
        expect(progress.completedCount).toBe(3);
      });

      it('should have 30-day tasks for each challenge', () => {
        CHALLENGES.forEach(ch => {
          expect(ch.tasks.length).toBe(30);
          expect(ch.totalDays).toBe(30);
        });
      });

      it('should have unique challenge IDs', () => {
        const ids = CHALLENGES.map(c => c.id);
        const unique = new Set(ids);
        expect(unique.size).toBe(ids.length);
      });
    });

    // ==== CALCULATOR — ENERGY & SHOPPING TESTS ====
    // Calculator functions already imported at the top

    describe('Calculator — Energy Calculation', () => {
      it('should calculate energy for default profile', () => {
        const result = calculateEnergy({ homeSize: 'medium', heatingType: 'gas', renewablePercent: 0 });
        expect(result).toBeGreaterThan(1000);
      });

      it('should reduce emissions with 100% renewables', () => {
        const noRenewable = calculateEnergy({ homeSize: 'medium', heatingType: 'gas', renewablePercent: 0 });
        const fullRenewable = calculateEnergy({ homeSize: 'medium', heatingType: 'gas', renewablePercent: 100 });
        expect(fullRenewable).toBeLessThan(noRenewable);
      });

      it('should have higher emissions for larger homes', () => {
        const small = calculateEnergy({ homeSize: 'small', heatingType: 'gas', renewablePercent: 0 });
        const large = calculateEnergy({ homeSize: 'large', heatingType: 'gas', renewablePercent: 0 });
        expect(large).toBeGreaterThan(small);
      });

      it('should handle heat_pump heating', () => {
        const gas = calculateEnergy({ homeSize: 'medium', heatingType: 'gas', renewablePercent: 0 });
        const heatPump = calculateEnergy({ homeSize: 'medium', heatingType: 'heat_pump', renewablePercent: 0 });
        expect(heatPump).toBeLessThan(gas);
      });

      it('should handle no heating', () => {
        const result = calculateEnergy({ homeSize: 'medium', heatingType: 'none', renewablePercent: 0 });
        expect(result).toBeGreaterThan(0); // Still has electricity
      });
    });

    describe('Calculator — Shopping Calculation', () => {
      it('should calculate shopping for default profile', () => {
        const result = calculateShopping({ shoppingHabit: 'moderate', onlineOrders: 4 });
        expect(result).toBeGreaterThan(0);
      });

      it('should have higher emissions for heavy shoppers', () => {
        const minimal = calculateShopping({ shoppingHabit: 'minimal', onlineOrders: 0 });
        const heavy = calculateShopping({ shoppingHabit: 'heavy', onlineOrders: 20 });
        expect(heavy).toBeGreaterThan(minimal);
      });

      it('should increase with more online orders', () => {
        const few = calculateShopping({ shoppingHabit: 'moderate', onlineOrders: 1 });
        const many = calculateShopping({ shoppingHabit: 'moderate', onlineOrders: 20 });
        expect(many).toBeGreaterThan(few);
      });
    });

    // ==== ROUTER TESTS ====
    const { navigateTo, getCurrentRoute, registerRoute } = await import('../js/router.js');

    describe('Router — Navigation', () => {
      it('navigateTo should update location hash', () => {
        navigateTo('/test-route');
        expect(window.location.hash).toBe('#/test-route');
      });

      it('should parse route path from hash', () => {
        // After navigateTo, getCurrentRoute may not have been set
        // since we didn't init the router, but the hash should be set
        expect(window.location.hash.startsWith('#/')).toBeTruthy();
      });
    });

    // Clean up test state
    resetState();


    // ---- Render Results ----
    const summaryEl = document.getElementById('summary');
    const resultsEl = document.getElementById('results');
    
    const passed = results.filter(r => r.pass).length;
    const failed = results.filter(r => !r.pass).length;
    const total = results.length;
    const totalTime = results.reduce((s, r) => s + r.time, 0);

    summaryEl.className = `summary ${failed > 0 ? 'fail' : 'pass'}`;
    summaryEl.innerHTML = `
      <strong>${failed > 0 ? '❌' : '✅'} ${passed}/${total} tests passed</strong> 
      (${failed} failed) — ${totalTime.toFixed(1)}ms
    `;

    // Group by suite
    const suites = {};
    results.forEach(r => {
      if (!suites[r.suite]) suites[r.suite] = [];
      suites[r.suite].push(r);
    });

    for (const [suite, tests] of Object.entries(suites)) {
      const h2 = document.createElement('h2');
      h2.textContent = suite;
      resultsEl.appendChild(h2);

      tests.forEach(t => {
        const div = document.createElement('div');
        div.className = `test-result ${t.pass ? 'pass' : 'fail'}`;
        div.innerHTML = `
          <span class="icon">${t.pass ? '✅' : '❌'}</span>
          <span class="name">${t.name}${t.error ? `<span class="error">${t.error}</span>` : ''}</span>
          <span class="time">${t.time.toFixed(1)}ms</span>
        `;
        resultsEl.appendChild(div);
      });
    }
  </script>
</body>
</html>
